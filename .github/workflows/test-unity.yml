name: Test Unity

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  pull_request:
    paths-ignore:
      - '**/*.md'

jobs:
  editmode-tests:
    name: Unity ${{ matrix.unityVersion }} EditMode Tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    strategy:
      fail-fast: false
      matrix:
        unityVersion:
          - 2022.3.62f1
          - 6000.0.62f1
    steps:
      - uses: actions/checkout@v4

      - name: Override Unity version
        run: |
          sed -i "s/m_EditorVersion: .*/m_EditorVersion: ${{ matrix.unityVersion }}/" src/UniCli.Unity/ProjectSettings/ProjectVersion.txt

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: src/UniCli.Unity/Library
          key: Library-${{ matrix.unityVersion }}-${{ hashFiles('src/UniCli.Unity/Packages/manifest.json', 'src/UniCli.Unity/Packages/packages-lock.json') }}
          restore-keys: |
            Library-${{ matrix.unityVersion }}-

      - name: Add Unity problem matcher
        run: echo "::add-matcher::.github/workflows/unity-problem-matcher.json"

      - uses: game-ci/unity-test-runner@v4
        id: tests
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: src/UniCli.Unity
          unityVersion: ${{ matrix.unityVersion }}
          testMode: EditMode

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Test results (${{ matrix.unityVersion }})
          path: ${{ steps.tests.outputs.artifactsPath }}
